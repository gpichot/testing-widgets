library:
  name: "testing-widgets"
  version: "0.1.0"
  repository: "https://github.com/gpichot/testing-widgets"
  description: "Widget Object Model — define UI test selectors and actions once, run them with React Testing Library or Playwright via adapters."
  primary_framework: "framework-agnostic"

domains:
  - name: "Authoring widgets"
    slug: "authoring"
    description: "Designing widget definitions: choosing selectors, shaping elements vs actions, parameterizing, and composing widgets."
  - name: "Connecting widgets to runners"
    slug: "wiring"
    description: "Adopting a widget definition inside a specific test runner — wiring the adapter, handling sync/async resolution semantics, and replacing direct-runner queries."

skills:
  - name: "Define a widget"
    slug: "define-widget"
    domain: "authoring"
    description: "Translate a UI feature into a widget() definition — pick accessibility-first locators, model elements and actions, parameterize elements, and compose nested widgets."
    type: "core"
    packages:
      - "testing-widgets"
    covers:
      - "widget() factory"
      - "LocatorWith API (byRole, byLabel, byText, byPlaceholder, byTestId)"
      - "Role shortcuts (button, heading, textbox, checkbox, radio, link, combobox, dialog, list, listitem, img, tab, tabpanel, navigation, region)"
      - "ByRoleOptions (name, checked, disabled, expanded, selected, pressed)"
      - "Parameterized elements (functions returning locators)"
      - "Action design (async composition of fill/click/check)"
      - "Widget composition (inner.from(l) for nesting)"
      - "enhance() / asCallable() helper utilities"
    tasks:
      - "Write a widget for a new component or feature"
      - "Add a parameterized element (e.g. row(name), cell(row, col))"
      - "Refactor a large widget by extracting a nested sub-widget"
      - "Replace ad-hoc selectors in existing tests with a widget"
    failure_modes:
      - mistake: "Bypassing the widget in test code"
        mechanism: "Agent uses screen.getByX(), container.querySelector(), or @testing-library/dom queries directly inside tests, defeating the widget abstraction."
        wrong_pattern: |
          // ❌ in a test file
          import { screen } from "@testing-library/react";
          screen.getByRole("button", { name: "Send" }).click();
        correct_pattern: |
          // ✅ go through the widget
          const { elements, actions } = contactForm.from(rtl(container, user));
          await actions.submit();
        source: "maintainer interview"
        priority: "CRITICAL"
        status: "active"
        skills: ["define-widget", "wire-rtl", "wire-playwright"]
      - mistake: "Using testId instead of role/label"
        mechanism: "Agent reaches for byTestId when an accessibility-tree query (role+name or label) would work, undermining the library's a11y-first design."
        wrong_pattern: |
          // ❌
          submitButton: l.byTestId("submit-btn"),
          nameInput: l.byTestId("name-input"),
        correct_pattern: |
          // ✅ prefer role > label > text > placeholder > testId
          submitButton: l.button({ name: "Send" }),
          nameInput: l.byLabel("Name"),
        source: "maintainer interview; packages/testing-ui/src/adapters/rtl.ts (implicitRoles)"
        priority: "HIGH"
        status: "active"
      - mistake: "Resolving elements at definition time"
        mechanism: "Agent calls .get() inside the widget factory, capturing a single DOM element at definition time instead of a lazy locator that re-resolves on each access."
        wrong_pattern: |
          // ❌ resolves once at .from() time
          export const form = widget((l) => ({
            elements: { heading: l.heading({ name: "Hi" }).get() },
          }));
        correct_pattern: |
          // ✅ keep the locator lazy
          export const form = widget((l) => ({
            elements: { heading: l.heading({ name: "Hi" }) },
          }));
        source: "packages/testing-ui/src/widget.ts; packages/testing-ui/src/adapters/rtl.ts (lazy())"
        priority: "HIGH"
        status: "active"
      - mistake: "Wrapping a static locator in a thunk"
        mechanism: "Agent writes `heading: () => l.heading(...)` for static elements; the extra function only makes sense when the element is parameterized."
        wrong_pattern: |
          // ❌ unneeded thunk
          elements: {
            heading: () => l.heading({ name: "Welcome" }),
          }
          // call site: elements.heading()() — double-call
        correct_pattern: |
          // ✅ bare locator (still callable)
          elements: {
            heading: l.heading({ name: "Welcome" }),
            // function form is only for parameterized elements:
            row: (name: string) => l.byRole("row", { name }),
          }
        source: "packages/example-react/src/ContactForm.widgets.ts (thankYou is parameterized; heading is not)"
        priority: "MEDIUM"
        status: "active"
      - mistake: "Non-async multi-step actions"
        mechanism: "Agent composes multiple awaitable calls inside an action without async/await, dropping promises and producing race conditions."
        wrong_pattern: |
          // ❌
          actions: {
            submit: () => {
              l.byLabel("Name").fill("Alice");
              l.button({ name: "Send" }).click();
            },
          }
        correct_pattern: |
          // ✅
          actions: {
            submit: async () => {
              await l.byLabel("Name").fill("Alice");
              await l.button({ name: "Send" }).click();
            },
          }
        source: "packages/testing-ui/src/types.ts (action methods return Promise<void>)"
        priority: "HIGH"
        status: "active"
      - mistake: "Re-declaring selectors instead of composing widgets"
        mechanism: "For a page composed of multiple widget-able regions, agent re-writes inner selectors in the outer widget instead of using `inner.from(l)`."
        wrong_pattern: |
          // ❌ duplicated selectors
          export const appPage = widget((l) => ({
            elements: {
              headerTitle: l.heading({ name: "My App" }),
              formSubmit: l.button({ name: "Submit" }),
            },
          }));
        correct_pattern: |
          // ✅ compose via inner.from(l)
          export const appPage = widget((l) => ({
            widgets: {
              header: header.from(l),
              form: form.from(l),
            },
          }));
        source: "packages/testing-ui/src/__tests__/widget.test.ts (composition test); packages/testing-ui/src/__tests__/rtl-adapter.test.ts"
        priority: "MEDIUM"
        status: "active"

  - name: "Wire RTL into existing tests"
    slug: "wire-rtl"
    domain: "wiring"
    description: "Adopt a widget definition inside a Vitest + React Testing Library suite: render, construct rtl(container, user), and assert through widget elements/actions."
    type: "framework"
    packages:
      - "testing-widgets"
    covers:
      - "rtl(container, user?) adapter constructor"
      - "userEvent integration (click/fill/clear/selectOption delegate when user provided)"
      - "Built-in DOM query engine (no @testing-library/dom dependency)"
      - "Sync resolution semantics (get(), getAll(), query(), queryAll())"
      - "Exact string match vs RegExp for text/label queries"
      - "Implicit role map (button, textbox, checkbox, radio, link, heading, list, listitem, combobox, dialog, img)"
      - "Subpath import: testing-widgets/adapters/rtl"
    tasks:
      - "Set up a vitest + RTL test using an existing widget"
      - "Add userEvent for realistic interactions"
      - "Migrate a screen.getByX() test to use a widget"
      - "Make a partial-text assertion (string is exact; use RegExp for partial)"
    failure_modes:
      - mistake: "Omitting userEvent"
        mechanism: "Without `user`, click() calls el.click() and fill() uses prototype descriptor writes. Controlled inputs and React-Hook-Form-style components often need real keyboard events, so tests pass with userEvent but fail without it (or vice versa)."
        wrong_pattern: |
          // ❌
          const { container } = render(<Form />);
          const { actions } = form.from(rtl(container));
          await actions.submit();  // synthetic events; may bypass React handlers
        correct_pattern: |
          // ✅
          const user = userEvent.setup();
          const { container } = render(<Form />);
          const { actions } = form.from(rtl(container, user));
          await actions.submit();
        source: "packages/testing-ui/src/adapters/rtl.ts (UserEventLike branch); docs/adapters/rtl.md"
        priority: "HIGH"
        status: "active"
      - mistake: "Asserting on the locator instead of the resolved element"
        mechanism: "Locators are callable — `elements.heading()` resolves to an HTMLElement, but `elements.heading` is the locator object. jest-dom matchers operate on the element."
        wrong_pattern: |
          // ❌ asserting on the locator function
          expect(elements.heading).toHaveTextContent("Hi");
        correct_pattern: |
          // ✅ invoke (or call .get()) to resolve
          expect(elements.heading()).toHaveTextContent("Hi");
          // equivalent: expect(elements.heading.get()).toHaveTextContent("Hi");
        source: "packages/testing-ui/src/callable.ts; packages/testing-ui/src/types.ts"
        priority: "HIGH"
        status: "active"
      - mistake: "Assuming substring text matching"
        mechanism: "byText/byLabel/byPlaceholder with a string compare exactly (`actual === expected`). Agents trained on @testing-library/dom may assume partial match by default."
        wrong_pattern: |
          // ❌ looks for an element whose entire trimmed text is this string
          l.byText("submitted")  // misses "Form submitted successfully"
        correct_pattern: |
          // ✅ use RegExp for partial/case-insensitive matching
          l.byText(/submitted/i)
        source: "packages/testing-ui/src/adapters/rtl.ts (matches())"
        priority: "MEDIUM"
        status: "active"
      - mistake: "Importing rtl from the root package entry"
        mechanism: "The RTL adapter is only exposed under the `testing-widgets/adapters/rtl` subpath export. Importing from the root will fail at resolution."
        wrong_pattern: |
          // ❌ no such export from the root
          import { rtl } from "testing-widgets";
        correct_pattern: |
          // ✅
          import { rtl } from "testing-widgets/adapters/rtl";
        source: "packages/testing-ui/package.json (exports)"
        priority: "MEDIUM"
        status: "active"
      - mistake: "Scoping rtl() to document.body when a container is available"
        mechanism: "Default rtl() scope is document.body. With multiple renders in a file (or Storybook portals), this matches outside the component under test. Pass render's container explicitly."
        wrong_pattern: |
          // ❌
          render(<Form />);
          const { elements } = form.from(rtl());  // scopes to document.body
        correct_pattern: |
          // ✅
          const { container } = render(<Form />);
          const { elements } = form.from(rtl(container, user));
        source: "packages/testing-ui/src/adapters/rtl.ts (default container = document.body)"
        priority: "MEDIUM"
        status: "active"
      - mistake: "ByRole state filters silently ignored"
        mechanism: "The RTL adapter only applies the `name` option in findAllByRole; `checked`, `disabled`, `expanded`, `selected`, and `pressed` are accepted by the type but ignored at runtime, so the locator matches more elements than expected."
        wrong_pattern: |
          // ❌ `checked: true` is ignored — matches every checkbox named "Accept"
          elements: { accepted: l.checkbox({ name: "Accept", checked: true }) }
        correct_pattern: |
          // ✅ assert state instead of filtering by it
          elements: { acceptBox: l.checkbox({ name: "Accept" }) }
          // test: expect(elements.acceptBox()).toBeChecked();
        source: "packages/testing-ui/src/adapters/rtl.ts (findAllByRole only checks options.name)"
        priority: "CRITICAL"
        status: "active"
        version_context: "Known bug in v0.1.0 — tracked in ROADMAP.md."

  - name: "Wire Playwright into e2e tests"
    slug: "wire-playwright"
    domain: "wiring"
    description: "Adopt a widget definition inside Playwright e2e tests: construct playwright(page), use lazy locators, and follow Playwright's async assertion patterns."
    type: "framework"
    packages:
      - "testing-widgets"
    covers:
      - "playwright(page | Locator) adapter constructor"
      - "PwLocatable / PwPageLike structural interfaces (no compile-time playwright dep)"
      - "Lazy Playwright Locator semantics (get(), query(), find() all return the locator)"
      - "Sync getAll()/queryAll() throw — use await locator.get().all()"
      - "Async assertions via @playwright/test expect()"
      - "Subpath import: testing-widgets/adapters/playwright"
    tasks:
      - "Set up a Playwright test using an existing widget"
      - "Iterate over a list of matching elements"
      - "Refactor a page.locator(...) e2e test to use a widget"
    failure_modes:
      - mistake: "Reaching for page.locator() inside tests"
        mechanism: "Agent uses raw Playwright queries (page.getByRole, page.locator) in the test body instead of going through the widget — the same antipattern as bypassing in RTL."
        wrong_pattern: |
          // ❌
          test("...", async ({ page }) => {
            await page.getByRole("button", { name: "Send" }).click();
          });
        correct_pattern: |
          // ✅
          test("...", async ({ page }) => {
            await page.goto("/");
            const { actions } = contactForm.from(playwright(page));
            await actions.submit();
          });
        source: "maintainer interview"
        priority: "CRITICAL"
        status: "active"
        skills: ["wire-playwright"]
      - mistake: "Calling getAll()/queryAll() on a Playwright locator"
        mechanism: "These methods throw with an explicit error in the Playwright adapter because Playwright resolution is async. Use `await locator.get().all()` instead."
        wrong_pattern: |
          // ❌ throws: "Playwright getAll() is async — use ..."
          const items = elements.itemList.getAll();
        correct_pattern: |
          // ✅
          const items = await elements.itemList.get().all();
        source: "packages/testing-ui/src/adapters/playwright.ts (getAll/queryAll throw)"
        priority: "HIGH"
        status: "active"
      - mistake: "ByRole options silently dropped"
        mechanism: "The Playwright adapter forwards only `name` to Playwright's getByRole. Other ByRoleOptions (checked, disabled, expanded, selected, pressed) are silently ignored — TypeScript accepts them, but they have no effect at runtime."
        wrong_pattern: |
          // ❌ `checked` is silently ignored in Playwright runs
          elements: { acceptedTerms: l.checkbox({ name: "Accept", checked: true }) }
        correct_pattern: |
          // ✅ assert state instead of filtering by it
          elements: { acceptTerms: l.checkbox({ name: "Accept" }) }
          // test: await expect(elements.acceptTerms.get()).toBeChecked();
        source: "packages/testing-ui/src/adapters/playwright.ts (getByRole forwards only { name })"
        priority: "CRITICAL"
        status: "active"
        version_context: "Present in v0.1.0 — type allows options the runtime drops."
      - mistake: "Awaiting the callable shorthand"
        mechanism: "elements.foo() returns a Playwright Locator synchronously (the adapter just hands back the underlying locator). Awaiting it is harmless but signals confusion — the async work happens in the assertion (expect) or action (click/fill)."
        wrong_pattern: |
          // ❌ pointless await; nothing async happens here
          const heading = await elements.heading();
        correct_pattern: |
          // ✅ await the assertion or the action
          await expect(elements.heading()).toHaveText("Hi");
          // or
          await actions.submit();
        source: "packages/testing-ui/src/adapters/playwright.ts (get() is sync)"
        priority: "MEDIUM"
        status: "active"
      - mistake: "Importing playwright adapter from the root entry"
        mechanism: "Adapter only available at the `testing-widgets/adapters/playwright` subpath."
        wrong_pattern: |
          // ❌
          import { playwright } from "testing-widgets";
        correct_pattern: |
          // ✅
          import { playwright } from "testing-widgets/adapters/playwright";
        source: "packages/testing-ui/package.json (exports)"
        priority: "MEDIUM"
        status: "active"

tensions:
  - name: "Accessibility-first selectors vs the testId reflex"
    skills: ["define-widget", "wire-rtl", "wire-playwright"]
    description: "Agents often default to byTestId because it is the most stable; the library is designed around the accessibility tree (role > label > text > placeholder > testId)."
    implication: "Without enforcement, agents will populate widgets with byTestId selectors that quietly drift from the user-facing semantics, eroding the value of the abstraction."
  - name: "Sync RTL semantics vs lazy Playwright semantics in shared widgets"
    skills: ["define-widget", "wire-rtl", "wire-playwright"]
    description: "The same widget definition must work in RTL (where resolution is synchronous and elements.x() returns an HTMLElement) and in Playwright (where resolution is lazy and elements.x() returns a Locator). Test code that assumes one return type breaks under the other adapter."
    implication: "Agents may write actions or assertions that depend on the RTL element shape; running the same widget under Playwright then misbehaves silently because the values are lazy Locators."

